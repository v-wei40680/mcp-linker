name: Build and Package Tauri App (x86_64 + aarch64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    name: Build x86_64 Linux (.deb)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Build x86_64 Tauri App
        run: |
          bun tauri build --target x86_64-unknown-linux-gnu

      - name: Upload Artifact (.deb)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-debian-x64
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/*.deb

  build-aarch64:
    runs-on: ubuntu-latest
    name: Cross Build aarch64 Linux (.deb)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker (for cross)
        run: |
          sudo apt update
          sudo apt install -y docker.io

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install dependencies
        run: bun install

      - name: Cross build aarch64 Tauri App
        run: |
          cross build --release --target aarch64-unknown-linux-gnu
          # Optional: custom packaging .deb if tauri build doesn't run inside cross
          # or use tauri-cli to package with existing binaries

      - name: Upload Artifact (.deb)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-debian-arm64
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/*.deb
