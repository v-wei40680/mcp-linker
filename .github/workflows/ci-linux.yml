name: Build and Package Tauri App (Debian Multi-Arch with Cross)

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/ci-linux.yml'
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: tauri-app-debian-x64
          - target: aarch64-unknown-linux-gnu
            artifact_name: tauri-app-debian-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Build with cross for ${{ matrix.target }}
        run: |
          bunx tauri build --target ${{ matrix.target }}

      - name: Upload Debian Package (${{ matrix.artifact_name }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
